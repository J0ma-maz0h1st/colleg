info:
  name: Login Request
  type: http
  seq: 2

http:
  method: POST
  url: "{{BaseURL}}users/login/"
  body:
    type: json
    data: |-
      {

          "email": "person@example.com",
          "password": "helloworld1"

      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
