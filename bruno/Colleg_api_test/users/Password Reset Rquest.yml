info:
  name: Password Reset Rquest
  type: http
  seq: 2

http:
  method: POST
  url: "{{BaseURL}}users/password-reset/"
  body:
    type: json
    data: |-
      {

          "email": "student@gmail.com"

      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
