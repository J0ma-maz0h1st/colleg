{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potential — IT & Digital Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'home/home.css' %}">
</head>
<body>
    <div class="bg-circuit"></div>

    {% block content %}
    {% endblock %}

    <div id="login-modal" class="modal-backdrop hidden">
        <div class="glass-card modal-content">
            <button id="close-modal-btn" class="modal-close">&times;</button>
            
            <h2 class="section-title"><span>Вход в систему</span></h2>
            <p class="lead">Введите ваши данные для доступа к платформе Potential.</p>
            
            <div id="login-error-alert" class="alert alert-error hidden"></div>

            <form id="login-form" class="form-grid">
                {% csrf_token %}
                <div class="form-field span-2">
                    <label>Email / Имя пользователя</label>
                    <input type="text" name="username" id="login-username" class="input-tech" required placeholder="yourname@potential.kg">
                </div>
                
                <div class="form-field span-2">
                    <label>Пароль</label>
                    <input type="password" name="password" id="login-password" class="input-tech" required placeholder="••••••••••••">
                </div>

                <div class="form-field span-2" style="text-align: center; margin-top: 1rem;">
                    <button type="submit" id="login-submit-btn" class="btn-gradient">Войти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'home/login.js' %}"></script>
</body>
</html>
