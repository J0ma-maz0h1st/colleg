{% load static %}
<header class="header {% if page_type == 'landing' %}header-landing{% elif page_type == 'main' %}header-main{% else %}header-profile{% endif %}">
    <div class="header-container">
        
        <a href="/" class="header-logo">
            <img src="{% static 'images/logo.png' %}" alt="Potential Logo" class="logo-image">
            <div class="logo-text">
                <h1 class="site-name">potential</h1>
                <p class="site-subtitle">IT & DIGITAL COURSES</p>
            </div>
        </a>
        
        <nav class="header-nav">
            {% if page_type == 'landing' %}
                <a href="#about" class="nav-link">О нас</a>
                <a href="#news" class="nav-link">Новости</a>
                <a href="#faq" class="nav-link">FAQ</a>
                <a href="#register-form" class="nav-btn nav-btn-secondary">Оставить заявку</a>
                <a href="{% url 'login' %}" class="nav-btn nav-btn-primary">Войти</a>

            {% elif page_type == 'main' %}
                <a href="{% url 'courses' %}" class="nav-link">Курсы</a>
                <a href="{% url 'tasks' %}" class="nav-link">Задачи</a>
                <a href="{% url 'rating' %}" class="nav-link">Рейтинг</a>
                <a href="{% url 'profile' %}" class="nav-link nav-profile-link">
                    <span>Личный кабинет</span>
                    </a>

            {% elif page_type == 'profile' %}
                <a href="{% url 'main' %}" class="nav-link">🎯 В каталог</a>
                <a href="{% url 'my_materials' %}" class="nav-link">Мои материалы</a>
                <a href="{% url 'logout' %}" class="nav-btn nav-btn-danger">Выйти</a>
            {% endif %}
        </nav>
        
    </div>
</header>
