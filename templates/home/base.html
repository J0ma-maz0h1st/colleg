{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PL potential · IT & Digital{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'home/home.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="bg-circuit" aria-hidden="true"></div>

    <header class="site-header">
        <div class="header-inner">
            <a href="#top" class="brand">
                <img src="{% static 'home/logo.png' %}" alt="PL Technology" class="brand-logo" width="80" height="80">
                <span class="brand-text">
                    <span class="brand-name">potential</span>
                    <span class="brand-tagline">IT &amp; Digital Courses</span>
                </span>
            </a>
            <nav class="site-nav">
                <a href="#application">Заявка</a>
                <a href="#news">Новости</a>
                <a href="#about">О нас</a>
                <a href="#faq">FAQ</a>
                <a href="/api/docs/" class="nav-api">API</a>
            </nav>
        </div>
    </header>

    <main id="top" class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>© {% now "Y" %} <strong>PL potential</strong> · IT &amp; Digital Courses</p>
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
