<h2 class="section-title"><span>Подать заявку</span></h2>
<div id="register-form" class="glass-card">
    <p class="lead">Пройдите первичную регистрацию. Доступ к личному кабинету откроется после верификации администратором.</p>
    
    {% if messages %}
        <div class="form-alerts">
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form action="/api/users/application/create/" method="POST" class="form-grid">
        {% csrf_token %}
        
        <div class="form-field">
            <label>Имя</label>
            <input type="text" name="first_name" class="input-tech" required placeholder="Нурлан">
        </div>
        
        <div class="form-field">
            <label>Фамилия</label>
            <input type="text" name="last_name" class="input-tech" required placeholder="Алиев">
        </div>

        <div class="form-field">
            <label>Email</label>
            <input type="email" name="email" class="input-tech" required placeholder="nurlan@potential.kg">
        </div>

        <div class="form-field">
            <label>Телефон</label>
            <input type="tel" name="phone" class="input-tech" required placeholder="+996 555 123 456">
        </div>

        <div class="form-field span-2">
            <label>Пароль</label>
            <input type="password" name="password" class="input-tech" required placeholder="••••••••••••">
        </div>

        <div class="form-field span-2" style="text-align: center; margin-top: 1rem;">
            <button type="submit" class="btn-gradient">Отправить данные</button>
        </div>
    </form>
</div>
