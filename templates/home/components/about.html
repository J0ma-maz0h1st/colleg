<h2 class="section-title"><span>О платформе</span></h2>
<div class="about-list">
    {% for section in about_sections %}
        <div class="about-card">
            <div class="about-body">
                <h3>{{ section.title }}</h3>
                <p class="about-content">{{ section.content }}</p>
            </div>
            {% if section.image %}
                <img src="{{ section.image.url }}" alt="{{ section.title }}">
            {% endif %}
        </div>
    {% empty %}
        <p class="empty-state">Секции ещё не заполнены.</p>
    {% endfor %}
</div>
