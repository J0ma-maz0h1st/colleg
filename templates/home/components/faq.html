<h2 class="section-title"><span>FAQ</span></h2>
<div class="faq-list">
    {% for faq in faq_items %}
        <details class="faq-item">
            <summary>
                <span>{{ faq.question }}</span>
                <span class="faq-chevron">▼</span>
            </summary>
            <div class="faq-answer">
                {{ faq.answer }}
            </div>
        </details>
    {% empty %}
        <p class="empty-state" style="padding: 1rem;">Вопросов пока нет.</p>
    {% endfor %}
</div>
