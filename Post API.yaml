components:
  schemas:
    AboutSection:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Заголовок секции
          maxLength: 255
        content:
          type: string
          title: Текст
        image:
          type: string
          format: uri
          nullable: true
          title: Изображение
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Порядок вывода
      required:
      - content
      - id
      - title
    AboutSectionRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          title: Заголовок секции
          maxLength: 255
        content:
          type: string
          minLength: 1
          title: Текст
        image:
          type: string
          format: binary
          nullable: true
          title: Изображение
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Порядок вывода
      required:
      - content
      - title
    Answer:
      type: object
      properties:
        id:
